# .github/workflows/ci.yml
name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read
  packages: write

jobs:
  test:
    runs-on: ubuntu-latest

    env:
      APP_NAME: "ChatOps Incident Agent"
      APP_ENVIRONMENT: "development"
      APP_DEBUG: "false"
      GEMINI_API_KEY: "dummy-gemini-key-for-ci"
      DISCORD_WEBHOOK_URL: "https://discord.com/api/webhooks/dummy"
      DB_HOST: "localhost"
      DB_PORT: "5432"
      DB_USER: "chatops_user"
      DB_PASSWORD: "chatops_password"
      DB_NAME: "chatops_db"

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Cache pip dependencies
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('pyproject.toml') }}
          restore-keys: |
            ${{ runner.os }}-pip-

      - name: Install package and dependencies
        run: pip install -e ".[dev]"

      - name: Run tests
        run: pytest tests/ -v

  build-and-push:
    name: Build & Push Docker Image
    runs-on: ubuntu-latest
    needs: test
    if: github.event_name == 'push'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: docker/Dockerfile
          push: true
          tags: ghcr.io/omeredry/chatops-incident-agent:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max
