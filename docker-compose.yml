services:
  db:
    image: postgres:15-alpine
    restart: unless-stopped
    ports:
      - "5433:5432"
    environment:
      POSTGRES_USER: chatops_user
      POSTGRES_PASSWORD: chatops_password
      POSTGRES_DB: chatops_db
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U chatops_user -d chatops_db"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
